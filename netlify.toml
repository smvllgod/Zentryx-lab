[build]
  command = "npm run build"
  publish = "out"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[functions."ai-chat"]
  # 60s is enough for multi-turn Claude conversations; Netlify free-tier
  # max is 10s, but the "synchronous streaming" mode we use runs under that.
  timeout = 60

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Static export pre-renders a single "_" placeholder for each dynamic admin
# detail route (see app/admin/strategies/[id]/page.tsx and users/[id]/page.tsx).
# These rewrites serve that placeholder for any real id; the client reads the
# id from window.location via useParams() and fetches its own data.
# force=false is the default, so these only fire when no static file matches.
[[redirects]]
  from = "/admin/strategies/*"
  to = "/admin/strategies/_/index.html"
  status = 200

[[redirects]]
  from = "/admin/users/*"
  to = "/admin/users/_/index.html"
  status = 200

[[redirects]]
  from = "/creator/*"
  to = "/creator/_/index.html"
  status = 200

[[redirects]]
  from = "/community/posts/*"
  to = "/community/posts/_/index.html"
  status = 200

# Live telemetry page for any strategy id — matches /strategies/<id>/live[/].
[[redirects]]
  from = "/strategies/*/live"
  to = "/strategies/_/live/index.html"
  status = 200
[[redirects]]
  from = "/strategies/*/live/"
  to = "/strategies/_/live/index.html"
  status = 200
